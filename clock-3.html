<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Table Clock</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Clock">
  <meta name="theme-color" content="#000000">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- DSEG7 Classic — real 7-segment LCD font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DSEG7+Classic&display=swap" rel="stylesheet">
  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }
    html,body{
      width:100%; height:100%;
      background:#000;
      overflow:hidden;
      touch-action:none;
    }

    /* ── Battery top-right ── */
    #battery-info{
      position:fixed; top:10px; right:12px;
      display:flex; align-items:center; gap:5px;
      z-index:200; color:#fff;
    }
    #battery-percent{
      font-family:'DSEG7 Classic','Courier New',monospace;
      font-size:15px; letter-spacing:1px; line-height:1;
    }
    #battery-icon svg{ width:26px; height:13px; display:block; }

    /* ── Back button: bottom-right corner ── */
    #back-btn{
      position:fixed; bottom:14px; right:16px;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.25);
      color:rgba(255,255,255,0.65);
      font-family:'DSEG7 Classic','Courier New',monospace;
      font-size:14px; padding:8px 14px;
      border-radius:10px;
      cursor:pointer; z-index:200;
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      display:flex; align-items:center; gap:6px;
    }
    #back-btn:active{ background:rgba(255,255,255,0.18); }

    /* ── Clock wrapper ── */
    #clock-wrapper{
      position:fixed; top:0; left:0;
      width:100%; height:100%;
      display:flex;
      justify-content:center;
    }

    /* Portrait: clock anchored near top */
    @media (orientation:portrait){
      #clock-wrapper{
        align-items:flex-start;
        padding-top:36px;   /* just below battery row */
      }
    }

    /* Landscape: clock centred */
    @media (orientation:landscape){
      #clock-wrapper{
        align-items:center;
        padding: 6px 6px 6px 6px;
      }
    }

    canvas{ display:block; image-rendering:pixelated; }
  </style>
</head>
<body>

<!-- Battery -->
<div id="battery-info">
  <span id="battery-percent">--%</span>
  <span id="battery-icon">
    <svg viewBox="0 0 28 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="0.5" y="0.5" width="24" height="13" rx="2"
            stroke="white" stroke-width="1.2"/>
      <rect x="25" y="4" width="3" height="6" rx="1" fill="white"/>
      <rect id="battery-fill" x="2" y="2" width="20" height="10"
            rx="1.2" fill="white"/>
    </svg>
  </span>
</div>

<!-- Clock canvas -->
<div id="clock-wrapper">
  <canvas id="clockCanvas"></canvas>
</div>

<!-- Back button bottom-right -->
<button id="back-btn" id="back-btn">
  <span style="font-family:sans-serif;font-size:16px;">&#8592;</span>
  <span style="font-family:'DSEG7 Classic',monospace;font-size:12px;">BACK</span>
</button>

<script>
/* ══ FULLSCREEN ══ */
function goFS(){
  const e = document.documentElement;
  const fn = e.requestFullscreen || e.webkitRequestFullscreen ||
             e.mozRequestFullScreen || e.msRequestFullscreen;
  if(fn) try{ fn.call(e,{navigationUI:'hide'}); }catch(_){}
}
/* trigger on first tap */
document.addEventListener('click', goFS, {once:true});

/* ══ BACK BUTTON ══ */
document.getElementById('back-btn').addEventListener('click', e=>{
  e.stopPropagation();           // don't retrigger fullscreen
  if(document.fullscreenElement ||
     document.webkitFullscreenElement){
    (document.exitFullscreen ||
     document.webkitExitFullscreen ||
     document.mozCancelFullScreen ||
     document.msExitFullscreen ||
     (()=>{})).call(document);
  }
  setTimeout(()=>{
    if(history.length>1) history.back();
    else window.close();
  }, 80);
});

/* ══ WAKE LOCK ══ */
async function keepAwake(){
  if('wakeLock' in navigator)
    try{ await navigator.wakeLock.request('screen'); }catch(_){}
}
keepAwake();
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible') keepAwake();
});

/* ══ BATTERY ══ */
(async()=>{
  if(!('getBattery' in navigator)) return;
  const b = await navigator.getBattery();
  function upd(){
    const p = Math.round(b.level*100);
    document.getElementById('battery-percent').textContent = p+'%';
    const f = document.getElementById('battery-fill');
    f.setAttribute('width', Math.round((p/100)*20));
    f.setAttribute('fill',  p<20 ? '#e74c3c' : 'white');
  }
  upd();
  b.addEventListener('levelchange',   upd);
  b.addEventListener('chargingchange',upd);
})();

/* ══ CANVAS CLOCK ══ */
const canvas = document.getElementById('clockCanvas');
const ctx    = canvas.getContext('2d');

/* ── Compute available square size ── */
function clockSize(){
  const portrait = window.innerHeight > window.innerWidth;
  if(portrait){
    const topPad  = 36;          // below battery
    const botPad  = 50;          // above back-btn area
    const avH = window.innerHeight - topPad - botPad;
    const avW = window.innerWidth  - 16;
    return Math.min(avW, avH);
  } else {
    const avW = window.innerWidth  - 16;
    const avH = window.innerHeight - 16;
    return Math.min(avW, avH);
  }
}

/* ── Resize canvas with DPR sharpness ── */
function resize(){
  const dpr  = Math.max(window.devicePixelRatio||1, 2); // at least 2× for clarity
  const size = clockSize();
  canvas.style.width  = size+'px';
  canvas.style.height = size+'px';
  canvas.width  = Math.round(size * dpr);
  canvas.height = Math.round(size * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

/* ── Tapered hand (no tail): wide at pivot, thin at tip ── */
function taperedHand(len, baseW, tipW){
  ctx.beginPath();
  // left side from base → tip
  ctx.moveTo(0,  -baseW/2);
  ctx.lineTo(len, -tipW/2);
  ctx.lineTo(len,  tipW/2);
  ctx.lineTo(0,   baseW/2);
  ctx.closePath();
}

/* ── Draw everything ── */
function draw(){
  const size = clockSize();
  ctx.clearRect(0,0,size,size);

  const cx = size/2, cy = size/2;
  const R  = size/2 - size*0.015;   // dial outer radius

  const now = new Date();
  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr  = now.getHours() % 12;

  /* outer ring */
  ctx.beginPath();
  ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.92)';
  ctx.lineWidth   = size*0.008;
  ctx.stroke();

  /* tick marks */
  for(let i=0;i<60;i++){
    const a    = (i/60)*Math.PI*2 - Math.PI/2;
    const isHr = i%5===0;
    const o    = R - size*0.004;
    const inn  = isHr ? R - R*0.115 : R - R*0.056;
    ctx.beginPath();
    ctx.moveTo(cx + o*Math.cos(a),   cy + o*Math.sin(a));
    ctx.lineTo(cx + inn*Math.cos(a), cy + inn*Math.sin(a));
    ctx.strokeStyle = isHr
      ? 'rgba(255,255,255,0.97)'
      : 'rgba(210,210,210,0.52)';
    ctx.lineWidth = isHr ? size*0.009 : size*0.0035;
    ctx.lineCap   = 'butt';
    ctx.stroke();
  }

  /* numbers — DSEG7 font */
  const numR  = R * 0.775;
  const fSize = Math.round(size * 0.082);
  ctx.font         = `${fSize}px 'DSEG7 Classic','Courier New',monospace`;
  ctx.fillStyle    = 'rgba(255,255,255,0.93)';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  for(let i=1;i<=12;i++){
    const a = (i/12)*Math.PI*2 - Math.PI/2;
    ctx.fillText(i, cx + numR*Math.cos(a), cy + numR*Math.sin(a));
  }

  /* hour hand (no tail) */
  const hrAng = ((hr + min/60 + sec/3600)/12)*Math.PI*2 - Math.PI/2;
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(hrAng);
  taperedHand(R*0.50, size*0.040, size*0.007);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.restore();

  /* minute hand (no tail) */
  const minAng = ((min + sec/60)/60)*Math.PI*2 - Math.PI/2;
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(minAng);
  taperedHand(R*0.76, size*0.027, size*0.005);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.restore();

  /* second hand (thin rod + short counter-tail, red) */
  const secAng = (sec/60)*Math.PI*2 - Math.PI/2;
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(secAng);
  ctx.beginPath();
  ctx.moveTo(-R*0.20, 0);
  ctx.lineTo( R*0.84, 0);
  ctx.strokeStyle = '#e8271e';
  ctx.lineWidth   = size*0.007;
  ctx.lineCap     = 'round';
  ctx.stroke();
  ctx.restore();

  /* red center circle */
  ctx.beginPath();
  ctx.arc(cx,cy, size*0.022, 0, Math.PI*2);
  ctx.fillStyle='#e8271e'; ctx.fill();

  /* small white dot on top */
  ctx.beginPath();
  ctx.arc(cx,cy, size*0.010, 0, Math.PI*2);
  ctx.fillStyle='#ffffff'; ctx.fill();
}

/* ── Tick exactly on second boundary ── */
function tick(){
  draw();
  const ms = new Date().getMilliseconds();
  setTimeout(tick, 1000 - ms);
}

/* ── Init ── */
/* Wait for DSEG7 font before first draw */
document.fonts.load("16px 'DSEG7 Classic'").finally(()=>{
  resize();
  tick();
});

window.addEventListener('resize', resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,250));

/* ══ SERVICE WORKER ══ */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
